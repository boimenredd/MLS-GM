<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MLS Front Office Simulator 2026</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <div class="brand-title">MLS FRONT OFFICE SIM</div>
      <div class="brand-sub">Browser-only MLS 2026 management sim</div>
    </div>

    <div class="topbar-center">
      <div class="meta-chip"><span>Club</span><strong id="clubName">—</strong></div>
      <div class="meta-chip"><span>Season</span><strong id="seasonLabel">2026</strong></div>
      <div class="meta-chip"><span>Phase</span><strong id="phaseLabel">Regular Season</strong></div>
      <div class="meta-chip"><span>Week</span><strong id="weekLabel">1</strong></div>
    </div>

    <div class="topbar-actions">
      <button id="themeBtn" class="ghost-btn" type="button">☾</button>
      <button id="saveBtn" class="ghost-btn" type="button">Save</button>
    </div>
  </header>

  <div class="app-shell">
    <aside class="sidebar">
      <div class="sidebar-title">Navigation</div>
      <button class="nav-btn active" data-page="dashboard" type="button">Dashboard</button>
      <button class="nav-btn" data-page="roster" type="button">Roster</button>
      <button class="nav-btn" data-page="lineup" type="button">Lineup</button>
      <button class="nav-btn" data-page="standings" type="button">Standings</button>
      <button class="nav-btn" data-page="schedule" type="button">Schedule</button>
      <button class="nav-btn" data-page="stats" type="button">Player Stats</button>
      <button class="nav-btn" data-page="leaders" type="button">League Leaders</button>
      <button class="nav-btn" data-page="transactions" type="button">Transactions</button>
      <button class="nav-btn" data-page="draft" type="button">SuperDraft</button>
      <button class="nav-btn" data-page="playoffs" type="button">Playoffs</button>
      <button class="nav-btn" data-page="saves" type="button">Saves</button>

      <div class="sidebar-title spaced">Simulation</div>
      <button id="simOneBtn" class="action-btn" type="button">Sim Next Week</button>
      <button id="simSeasonBtn" class="action-btn" type="button">Sim To End Of Season</button>
      <button id="simYearBtn" class="action-btn" type="button">Sim Offseason + Next Year</button>
    </aside>

    <main class="main">
      <section id="page-dashboard" class="page active"></section>
      <section id="page-roster" class="page"></section>
      <section id="page-lineup" class="page"></section>
      <section id="page-standings" class="page"></section>
      <section id="page-schedule" class="page"></section>
      <section id="page-stats" class="page"></section>
      <section id="page-leaders" class="page"></section>
      <section id="page-transactions" class="page"></section>
      <section id="page-draft" class="page"></section>
      <section id="page-playoffs" class="page"></section>
      <section id="page-saves" class="page"></section>
    </main>
  </div>

  <div id="bootOverlay" class="overlay open">
    <div class="modal boot-modal">
      <h1>Start New Save</h1>
      <p>Create a new MLS league or load an existing IndexedDB slot.</p>

      <div class="boot-grid">
        <div>
          <label for="userTeamSelect">User Club</label>
          <select id="userTeamSelect"></select>
        </div>
        <div>
          <label for="saveSlotInput">Save Slot</label>
          <input id="saveSlotInput" type="text" value="default" />
        </div>
      </div>

      <div class="boot-actions">
        <button id="newLeagueBtn" class="primary-btn" type="button">Create New League</button>
        <button id="loadLeagueBtn" class="ghost-btn" type="button">Load Existing Slot</button>
      </div>
    </div>
  </div>

  <div id="matchOverlay" class="overlay">
    <div class="modal match-modal">
      <div class="match-head">
        <h2 id="matchTitle">Latest Match</h2>
        <div id="matchMinute">FT</div>
      </div>
      <div id="matchScore" class="scoreline">0 - 0</div>
      <div id="matchCommentary" class="commentary"></div>
      <div class="match-foot">
        <button id="closeMatchBtn" class="ghost-btn" type="button">Close</button>
      </div>
    </div>
  </div>

  <div id="toastWrap" class="toast-wrap"></div>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
